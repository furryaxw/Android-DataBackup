name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag used for the GitHub Release, for example v3.0.0"
        required: true
        type: string
      alpha:
        description: "Build Alpha release APKs"
        required: true
        default: true
        type: boolean
      premium:
        description: "Build Premium release APKs"
        required: true
        default: true
        type: boolean
      foss:
        description: "Build Foss release APKs"
        required: true
        default: true
        type: boolean
      draft:
        description: "Create draft release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: source

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup gradle
        uses: gradle/gradle-build-action@v2

      - name: Setup gradlew
        run: chmod +x gradlew

      - name: Resolve release config
        id: config
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag_name }}"
            ALPHA="${{ inputs.alpha }}"
            PREMIUM="${{ inputs.premium }}"
            FOSS="${{ inputs.foss }}"
            DRAFT="${{ inputs.draft }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG="${GITHUB_REF_NAME}"
            ALPHA="true"
            PREMIUM="true"
            FOSS="true"
            DRAFT="false"
            PRERELEASE="false"
          fi

          if [ -z "${TAG}" ]; then
            echo "Release tag is empty." >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "alpha=${ALPHA}" >> "$GITHUB_OUTPUT"
          echo "premium=${PREMIUM}" >> "$GITHUB_OUTPUT"
          echo "foss=${FOSS}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Check build-logic
        run: ./gradlew check -p build-logic

      - name: Decode store file
        env:
          STORE_FILE: ${{ secrets.STORE_FILE }}
          ENCODED_STRING: ${{ secrets.STORE_BASE64 }}
        shell: bash
        run: |
          if [ -z "${STORE_FILE}" ] || [ -z "${ENCODED_STRING}" ]; then
            echo "Missing signing secrets STORE_FILE or STORE_BASE64." >&2
            exit 1
          fi
          echo "${ENCODED_STRING}" | base64 -di > "./app/${STORE_FILE}"

      - name: Build release APKs
        env:
          STORE_FILE: ${{ secrets.STORE_FILE }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUILD_ALPHA: ${{ steps.config.outputs.alpha }}
          BUILD_PREMIUM: ${{ steps.config.outputs.premium }}
          BUILD_FOSS: ${{ steps.config.outputs.foss }}
        shell: bash
        run: |
          TASKS=()

          if [ "${BUILD_ALPHA}" = "true" ]; then
            TASKS+=(
              assembleArm64-v8aAlphaRelease
              assembleArmeabi-v7aAlphaRelease
              assembleX86AlphaRelease
              assembleX86_64AlphaRelease
            )
          fi

          if [ "${BUILD_PREMIUM}" = "true" ]; then
            TASKS+=(
              assembleArm64-v8aPremiumRelease
              assembleArmeabi-v7aPremiumRelease
              assembleX86PremiumRelease
              assembleX86_64PremiumRelease
            )
          fi

          if [ "${BUILD_FOSS}" = "true" ]; then
            TASKS+=(
              assembleArm64-v8aFossRelease
              assembleArmeabi-v7aFossRelease
              assembleX86FossRelease
              assembleX86_64FossRelease
            )
          fi

          if [ ${#TASKS[@]} -eq 0 ]; then
            echo "No release variants selected." >&2
            exit 1
          fi

          ./gradlew "${TASKS[@]}" --daemon --parallel

      - name: Collect APKs
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          find app/build/outputs/apk -path "*/release/*.apk" -type f -exec cp {} dist/ \;
          find dist -maxdepth 1 -name "*.apk" -print
          test -n "$(find dist -maxdepth 1 -name '*.apk' -print -quit)"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks-${{ steps.config.outputs.tag }}
          path: source/dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.config.outputs.tag }}
          DRAFT_RELEASE: ${{ steps.config.outputs.draft }}
          PRERELEASE_RELEASE: ${{ steps.config.outputs.prerelease }}
        shell: bash
        run: |
          ASSETS=(dist/*.apk)

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ASSETS[@]}" --clobber
          else
            ARGS=()
            if [ "${DRAFT_RELEASE}" = "true" ]; then
              ARGS+=(--draft)
            fi
            if [ "${PRERELEASE_RELEASE}" = "true" ]; then
              ARGS+=(--prerelease)
            fi

            gh release create "${RELEASE_TAG}" "${ASSETS[@]}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --target "${GITHUB_SHA}" \
              "${ARGS[@]}"
          fi
